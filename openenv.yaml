name: swasthai
version: 1.0.0
description: "Healthcare triage & diagnosis workflow environment (SwasthAI hackathon layer)."

tasks:
  - id: easy_fever_cough
    name: easy_fever_cough
    grader: openenv_submission.grader:grade_easy_fever_cough
  - id: medium_flu_vs_dengue
    name: medium_flu_vs_dengue
    grader: openenv_submission.grader:grade_medium_flu_vs_dengue
  - id: hard_dengue_like
    name: hard_dengue_like
    grader: openenv_submission.grader:grade_hard_dengue_like
  - id: expert_malaria_mimic
    name: expert_malaria_mimic
    grader: openenv_submission.grader:grade_expert_malaria_mimic
  - id: expert_typhoid_enteric
    name: expert_typhoid_enteric
    grader: openenv_submission.grader:grade_expert_typhoid_enteric

graders:
  easy_fever_cough: openenv_submission.grader:grade_easy_fever_cough
  medium_flu_vs_dengue: openenv_submission.grader:grade_medium_flu_vs_dengue
  hard_dengue_like: openenv_submission.grader:grade_hard_dengue_like
  expert_malaria_mimic: openenv_submission.grader:grade_expert_malaria_mimic
  expert_typhoid_enteric: openenv_submission.grader:grade_expert_typhoid_enteric

entrypoint:
  env_module: openenv_submission.server.environment
  env_class: SwasthAIEnvironment

api:
  reset: reset
  step: step
  state: state
